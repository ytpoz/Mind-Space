<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mind Space</title>
    <style>
        /* =========================================
           1. 基本テーマ・深淵なネオン宇宙背景（省電力オフ）
           ========================================= */
        :root {
            --neon-blue: #00ffcc;
            --neon-glow: rgba(0, 255, 204, 0.4);
            --neon-gold: #ffea00;
            --neon-gold-glow: rgba(255, 234, 0, 0.4);
            --delete-red: #ff4a86;
            --complete-green: #39ff14;
            --complete-glow: rgba(57, 255, 20, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #03040c;
            /* 幾重にも重ねた美しい星雲（ネビュラ）グラデーション */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(81, 19, 137, 0.35) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(13, 85, 116, 0.35) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(11, 14, 38, 0.9) 0%, #03040b 100%);
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
            touch-action: none;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
                radial-gradient(rgba(0,255,204,0.2) 2px, transparent 2px);
            background-size: 180px 180px, 300px 300px;
            pointer-events: none;
            z-index: 2;
            opacity: 0.4;
            animation: space-drift 240s linear infinite;
        }

        @keyframes space-drift {
            from { transform: translate(0, 0); }
            to { transform: translate(150px, 150px); }
        }

        /* =========================================
           2. 省電力モード時のスタイル
           ========================================= */
        body.power-saving {
            background-image: none !important;
            background-color: #0b0d19 !important;
            overflow-y: auto;
            touch-action: auto;
        }
        body.power-saving::before { display: none; }
        body.power-saving .star { display: none; }

        /* =========================================
           3. 固定UI要素
           ========================================= */
        header {
            position: fixed;
            top: 20px; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            box-sizing: border-box;
            /* z-indexを130へ引き上げ、サイドバー(z-index: 120)よりも前面に常時表示 */
            z-index: 130;
            pointer-events: none;
        }

        header * { pointer-events: auto; }

        .logo {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-glow);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ヘッダー内 完了リスト開閉ボタン */
        .header-btn {
            background: rgba(5, 7, 22, 0.7);
            border: 1px solid rgba(57, 255, 20, 0.4);
            color: var(--complete-green);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
            outline: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-btn:hover {
            background: var(--complete-green);
            color: #03040c;
            box-shadow: 0 0 15px var(--complete-green);
        }

        /* パネルが展開されている際のアクティブカラー表現 */
        body:not(.panel-closed) #completed-toggle-trigger {
            background: var(--complete-green);
            color: #03040c;
            box-shadow: 0 0 15px var(--complete-green);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(5, 7, 22, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(5px);
        }

        .toggle-label { font-size: 11px; color: #8fa0ba; text-transform: uppercase; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255, 255, 255, 0.1); transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #8fa0ba; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(0, 255, 204, 0.2); }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .input-region {
            position: fixed;
            top: 90px; left: 50%;
            transform: translateX(-50%);
            width: 85%; max-width: 500px;
            text-align: center;
            z-index: 110;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 768px) {
            body:not(.panel-closed) .input-region:not(.power-saving-region) {
                left: calc(50% - 130px);
            }
        }

        body.power-saving .input-region {
            position: relative;
            top: 100px; left: 50%;
            transform: translateX(-50%);
            width: 90%; margin-bottom: 20px;
        }

        .input-box-wrapper { position: relative; width: 100%; perspective: 800px; }

        #idea-input {
            width: 100%; padding: 16px 24px; font-size: 16px;
            background: rgba(5, 7, 22, 0.85);
            border: 2px solid var(--neon-blue); border-radius: 30px;
            color: #fff; box-shadow: 0 0 20px var(--neon-glow);
            outline: none; box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px); transform-style: preserve-3d;
        }

        #idea-input:focus { box-shadow: 0 0 35px rgba(0, 255, 204, 0.8); }

        .approaching-new-input { animation: approachInput 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes approachInput {
            0% { transform: translateZ(-600px) rotateX(45deg); opacity: 0; filter: blur(5px); }
            100% { transform: translateZ(0) rotateX(0deg); opacity: 1; filter: blur(0); }
        }

        .hint { font-size: 11px; color: var(--neon-blue); margin-top: 8px; letter-spacing: 1px; text-shadow: 0 0 5px var(--neon-glow); }

        /* 空状態のメッセージ表示スタイル（白に統一） */
        #empty-message {
            position: fixed;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px; font-weight: 500; letter-spacing: 1.5px;
            pointer-events: none; z-index: 8;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; line-height: 1.6;
        }
        body.power-saving #empty-message { position: relative; top: auto; left: auto; transform: none; margin: 60px auto 20px auto; padding: 0 20px; }

        .zoom-controls { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        body.power-saving .zoom-controls { display: none; }

        .zoom-btn {
            width: 44px; height: 44px; background: rgba(5, 7, 22, 0.8);
            border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 50%;
            color: var(--neon-blue); fill: var(--neon-blue);
            font-size: 20px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,255,204,0.1); transition: all 0.2s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .zoom-btn:hover { background: var(--neon-blue); color: #000; fill: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* =========================================
           4. 完了エリア（右側スライドドロワーパネル）
           ========================================= */
        #completed-panel {
            position: fixed; top: 0; right: 0; width: 280px; height: 100vh;
            background: rgba(3, 4, 15, 0.88); border-left: 2px solid rgba(57, 255, 20, 0.3);
            box-shadow: -10px 0 30px rgba(57, 255, 20, 0.15); backdrop-filter: blur(20px);
            z-index: 120; padding: 100px 18px 30px 18px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }

        body.panel-closed #completed-panel { transform: translateX(280px); }

        #panel-toggle-btn {
            position: absolute; left: -36px; top: 100px; width: 36px; height: 48px;
            background: rgba(3, 4, 15, 0.9); border: 2px solid rgba(57, 255, 20, 0.3); border-right: none;
            border-radius: 8px 0 0 8px; color: var(--complete-green); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            box-shadow: -4px 4px 10px rgba(0, 0, 0, 0.3); z-index: 125; outline: none;
            transition: background 0.2s, color 0.2s;
        }
        #panel-toggle-btn:hover { background: var(--complete-green); color: #000; }

        body.power-saving #completed-panel {
            background: #101424; box-shadow: none; border-left: 1px solid rgba(57, 255, 20, 0.2); backdrop-filter: none;
        }

        .completed-title {
            font-size: 13px; font-weight: bold; letter-spacing: 2px;
            color: var(--complete-green); text-shadow: 0 0 10px var(--complete-glow);
            text-transform: uppercase; border-bottom: 1px solid rgba(57, 255, 20, 0.2);
            padding-bottom: 8px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between;
        }
        .completed-title::after { content: "✓ COMPLETED"; font-size: 10px; opacity: 0.8; }

        .completed-capsule {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.08) 0%, rgba(0, 200, 255, 0.05) 100%);
            border: 1px dashed var(--complete-green); border-radius: 20px; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 10px rgba(57, 255, 20, 0.05); cursor: grab; user-select: none;
            transition: all 0.2s ease; font-size: 13px; animation: fadeIn 0.4s ease; touch-action: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .completed-capsule:hover { border-style: solid; box-shadow: 0 0 12px rgba(57, 255, 20, 0.2); background: linear-gradient(135deg, rgba(57, 255, 20, 0.15) 0%, rgba(0, 200, 255, 0.08) 100%); }
        .completed-capsule:active { cursor: grabbing; opacity: 0.6; }
        body.power-saving .completed-capsule { background: #111a1e; border-color: #244634; box-shadow: none; }

        /* =========================================
           5. 宇宙キャンバス
           ========================================= */
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: grab; overflow: hidden; }
        #viewport:active { cursor: grabbing; }
        body.power-saving #viewport { position: relative; cursor: default; transform: none !important; width: auto; height: auto; overflow: visible; }

        #space-container { position: absolute; width: 5000px; height: 5000px; top: -2500px; left: -2500px; transform-origin: center center; z-index: 12; }
        #space-container.smooth-returning { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) !important; }

        body.power-saving #space-container {
            position: relative; width: auto; height: auto; top: auto; left: auto; transform: none !important;
            display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 120px auto 10px auto; padding: 0 15px; box-sizing: border-box;
        }

        #connections-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        body.power-saving #connections-svg { display: none; }

        .thread-line { stroke: rgba(0, 255, 204, 0.35); stroke-width: 2px; fill: none; stroke-dasharray: 8 4; animation: thread-dash 15s linear infinite; transition: stroke 0.3s; }
        .thread-line.highlight { stroke: #ffea00; stroke-width: 4px; filter: drop-shadow(0 0 8px #ffea00); }
        @keyframes thread-dash { to { stroke-dashoffset: -120; } }

        /* =========================================
           6. カプセル要素
           ========================================= */
        .capsule {
            position: absolute; min-width: 190px; max-width: 340px;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.12) 0%, rgba(0, 150, 255, 0.08) 100%);
            border: 2px solid var(--neon-blue); border-radius: 50px; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: grab; user-select: none; box-shadow: 0 4px 20px rgba(0, 255, 204, 0.15);
            backdrop-filter: blur(8px); z-index: 20; box-sizing: border-box;
            animation: float-rotate 12s ease-in-out infinite alternate; touch-action: none;
        }

        @keyframes float-rotate { 0% { transform: rotate(-0.5deg); } 100% { transform: rotate(0.5deg); } }
        .capsule:active { cursor: grabbing; z-index: 1000; }

        .capsule.first-fixed {
            border-color: var(--neon-gold) !important;
            background: linear-gradient(135deg, rgba(255, 234, 0, 0.18) 0%, rgba(255, 100, 0, 0.08) 100%) !important;
            box-shadow: 0 0 25px var(--neon-gold-glow) !important; cursor: default !important; z-index: 15;
        }
        .capsule.first-fixed .priority-num { background: rgba(255, 234, 0, 0.25) !important; border-color: var(--neon-gold) !important; color: var(--neon-gold) !important; box-shadow: 0 0 10px var(--neon-gold-glow) !important; }

        .priority-num {
            background: rgba(0, 255, 204, 0.2); border: 1px solid var(--neon-blue); color: var(--neon-blue);
            border-radius: 50%; width: 24px; height: 24px; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0;
            box-shadow: 0 0 8px var(--neon-glow);
        }

        .capsule-text { font-size: 14px; font-weight: 600; color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); margin-right: 8px; word-break: break-all; flex-grow: 1; }
        .capsule-controls { display: flex; align-items: center; gap: 8px; }

        .power-saving-arrows { display: none; gap: 4px; }
        body.power-saving .power-saving-arrows { display: flex; }
        body.power-saving .capsule.first-fixed .power-saving-arrows { display: none !important; }

        .arrow-btn { font-size: 12px !important; color: #8fa0ba; }
        .arrow-btn:hover { color: var(--neon-blue); }

        .control-btn {
            background: none; border: none; cursor: pointer; font-size: 18px; opacity: 0.5; transition: all 0.2s;
            padding: 0 3px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;
        }
        .control-btn:hover { opacity: 1; transform: scale(1.2); }
        .complete-btn { color: var(--complete-green); }
        .delete-btn { color: var(--delete-red); font-size: 20px; }

        /* =========================================
           7. モーフィング射出用ファントム
           ========================================= */
        .capsule-phantom {
            position: fixed; background: rgba(5, 7, 22, 0.95); border: 2px solid var(--neon-blue); border-radius: 30px;
            color: #fff; padding: 16px 24px; font-size: 18px; font-weight: 600; box-shadow: 0 0 25px var(--neon-blue);
            z-index: 9999; pointer-events: none; box-sizing: border-box; display: flex; align-items: center; opacity: 1;
            transition: left 0.75s cubic-bezier(0.19, 1, 0.22, 1), top 0.75s cubic-bezier(0.19, 1, 0.22, 1), width 0.75s cubic-bezier(0.19, 1, 0.22, 1), height 0.75s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.75s cubic-bezier(0.19, 1, 0.22, 1), background-color 0.75s ease, box-shadow 0.75s ease, opacity 0.75s ease, transform 0.75s ease;
        }
        .capsule-phantom.morphing { background-color: rgba(0, 255, 204, 0.15); box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3); border-radius: 50px; opacity: 0.85; }

        /* =========================================
           8. 省電力モード時のドラッグ中アニメーション等
           ========================================= */
        body.power-saving .capsule {
            position: relative !important; top: auto !important; left: auto !important;
            transform: none !important; animation: none !important; width: 100%; max-width: 100%;
            background: #151a30; border-color: #3b4870; box-shadow: none; backdrop-filter: none;
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s ease;
        }
        body.power-saving .capsule.first-fixed { border-color: #3b4870 !important; background: #151a30 !important; box-shadow: none !important; }
        body.power-saving .capsule-text { text-shadow: none; }
        body.power-saving .priority-num { background: rgba(255,255,255,0.05); border-color: #3b4870; color: #8fa0ba; box-shadow: none; }
        
        /* 省電力モードドラッグ中のハイライト */
        body.power-saving .capsule.saving-dragging {
            opacity: 0.8; background: #222b4d !important; border-color: var(--neon-blue) !important;
            box-shadow: 0 5px 15px rgba(0,255,204,0.2) !important; z-index: 500; transform: scale(1.02);
        }
    </style>
</head>
<body class="panel-closed">

    <header>
        <div class="logo">Mind Space</div>
        <div class="header-actions">
            <!-- いつでも開閉可能な完了トグルボタン -->
            <button id="completed-toggle-trigger" class="header-btn" title="完了リストを開閉">
                <span style="font-size: 12px; font-weight: bold;">✓</span> COMPLETED
            </button>
            <div class="toggle-container">
                <span class="toggle-label" id="mode-status">省電力: OFF</span>
                <label class="switch">
                    <input type="checkbox" id="power-saving-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <div class="input-region" id="input-region">
        <div class="input-box-wrapper" id="input-box-wrapper">
            <input type="text" id="idea-input" placeholder="浮かんだアイデアを解き放つ..." autofocus autocomplete="off">
        </div>
        <div class="hint">Enter キーで入力欄そのものが宇宙へ射出されます</div>
    </div>

    <div id="empty-message">
        <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>カプセルを追加して頭を整理しましょう！</span>
    </div>

    <div id="completed-panel" ondragover="event.preventDefault();">
        <button id="panel-toggle-btn" title="パネルを開閉">◀</button>
        <div class="completed-title">COMPLETED</div>
    </div>

    <div id="viewport">
        <div id="space-container">
            <svg id="connections-svg"></svg>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="拡大">＋</button>
        <button class="zoom-btn" id="zoom-out" title="縮小">－</button>
        <button class="zoom-btn" id="zoom-reset" title="ホームに戻る">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </button>
    </div>

    <!-- Firebase Realtime Database 同期ロジック -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Firebaseの接続情報
        const firebaseConfig = {
            apiKey: "AIzaSyAQkrWXzQTEJ8-axr585SGgZ5AxGtiRbu4",
            authDomain: "mind-space-ccf0e.firebaseapp.com",
            databaseURL: "https://mind-space-ccf0e-default-rtdb.firebaseio.com",
            projectId: "mind-space-ccf0e",
            storageBucket: "mind-space-ccf0e.firebasestorage.app",
            messagingSenderId: "320267808467",
            appId: "1:320267808467:web:b0b1e21d485f5779622e26"
        };

        // Firebaseの初期化
        let db = null;
        let isFirebaseActive = false;

        if (firebaseConfig && firebaseConfig.databaseURL && firebaseConfig.databaseURL !== "") {
            try {
                const app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                isFirebaseActive = true;
                console.log("🚀 Firebase Realtime Database に接続しました。");
            } catch (err) {
                console.warn("⚠️ Firebaseの初期化に失敗しました。ローカルモードで動作します:", err);
            }
        } else {
            console.warn("⚠️ Firebaseの設定が正しく読み込めないため、ローカルモードで動作しています。");
        }

        const ideaInput = document.getElementById('idea-input');
        const inputRegion = document.getElementById('input-region');
        const emptyMessage = document.getElementById('empty-message');
        const viewport = document.getElementById('viewport');
        const spaceContainer = document.getElementById('space-container');
        const svgElement = document.getElementById('connections-svg');
        const powerToggle = document.getElementById('power-saving-toggle');
        const modeStatus = document.getElementById('mode-status');
        const completedPanel = document.getElementById('completed-panel');
        const panelToggleBtn = document.getElementById('panel-toggle-btn');
        const completedToggleTrigger = document.getElementById('completed-toggle-trigger');

        let isPowerSaving = false;
        let capsules = []; 
        let isFirstLoad = true; // 初回データ読み込み判別フラグ

        // パン＆ズーム
        let panX = 0; let panY = 0; let scale = 1.0;
        let isGlobalDraggingItem = false;
        let physicsItems = []; 

        /* =========================================
           I. クラウド同期システム（Firebase連携）
           ========================================= */
        // クラウドへデータを保存
        function uploadDataToCloud() {
            if (!isFirebaseActive) return;

            // 送信用に軽くて純粋な配列データを作成
            const listData = capsules.map(cap => {
                const phys = physicsItems.find(p => p.el === cap);
                return {
                    text: cap.querySelector('.capsule-text').textContent,
                    x: phys ? phys.x : 2500,
                    y: phys ? phys.y : 2500
                };
            });

            const completedItems = Array.from(completedPanel.querySelectorAll('.completed-capsule')).map(el => {
                return el.querySelector('span').textContent.replace('✓ ', '');
            });

            set(ref(db, 'mindspace/data'), {
                capsules: listData,
                completed: completedItems
            });
        }

        // クラウドの変更を監視し「なるはや」で画面に降ろす
        if (isFirebaseActive) {
            onValue(ref(db, 'mindspace/data'), (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    clearAllElements();
                    checkEmptyState();
                    return;
                }
                syncInterfaceFromCloud(data.capsules || [], data.completed || []);
            });
        }

        function clearAllElements() {
            capsules.forEach(c => c.remove());
            capsules = [];
            physicsItems = [];
            Array.from(completedPanel.querySelectorAll('.completed-capsule')).forEach(el => el.remove());
        }

        function syncInterfaceFromCloud(cloudCapsules, cloudCompleted) {
            // 現存するDOMを一旦削除
            capsules.forEach(c => c.remove());
            capsules = [];
            physicsItems = [];

            // カプセルの再構築
            cloudCapsules.forEach((cData) => {
                rebuildCapsuleElement(cData.text, cData.x, cData.y);
            });

            // 完了リストの再構築
            Array.from(completedPanel.querySelectorAll('.completed-capsule')).forEach(el => el.remove());
            cloudCompleted.forEach((text) => {
                rebuildCompletedElement(text);
            });

            updatePriorityNumbers();
            updateThreads();
            checkEmptyState();

            // Firebaseから初回データが同期された直後、確実にホームアラインを実行
            if (isFirstLoad) {
                isFirstLoad = false;
                setTimeout(() => {
                    resetToHomeView(false);
                }, 150); // DOM要素がマウントされてサイズが計算可能になるのを見越してバッファ時間を確保
            }
        }

        /* =========================================
           II. 星屑の生成 & 空状態チェック
           ========================================= */
        function createStars() {
            const starCount = 100;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`; star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`; star.style.top = `${Math.random() * 100}%`;
                star.style.animation = `blink ${Math.random() * 3 + 2}s ease-in-out infinite`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                document.body.appendChild(star);
            }
        }

        // 状態をチェックして空っぽメッセージを表示・非表示にする
        function checkEmptyState() {
            if (capsules.length === 0) {
                emptyMessage.style.opacity = '1';
                emptyMessage.style.pointerEvents = 'none';
            } else {
                emptyMessage.style.opacity = '0';
            }
        }

        /* =========================================
           III. パン（視点移動）＆ズーム
           ========================================= */
        let isPanning = false; let startPointerX = 0; let startPointerY = 0; let initialPanX = 0; let initialPanY = 0;
        let activePointers = {}; let initialPinchDistance = 0; let initialScale = 1.0;

        viewport.addEventListener('pointerdown', (e) => {
            if (e.target !== viewport && e.target !== spaceContainer && e.target !== svgElement) return;
            if (isPowerSaving || isGlobalDraggingItem) return;

            viewport.setPointerCapture(e.pointerId);
            activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            const pointerIds = Object.keys(activePointers);

            if (pointerIds.length === 1) {
                isPanning = true; startPointerX = e.clientX; startPointerY = e.clientY;
                initialPanX = panX; initialPanY = panY;
            } else if (pointerIds.length === 2) {
                isPanning = false;
                const p1 = activePointers[pointerIds[0]]; const p2 = activePointers[pointerIds[1]];
                initialPinchDistance = Math.hypot(p2.x - p1.x, p2.y - p1.y); initialScale = scale;
            }
        });

        viewport.addEventListener('pointermove', (e) => {
            if (isPowerSaving || !activePointers[e.pointerId]) return;
            activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            const pointerIds = Object.keys(activePointers);

            if (pointerIds.length === 1 && isPanning) {
                panX = initialPanX + (e.clientX - startPointerX);
                panY = initialPanY + (e.clientY - startPointerY);
                updateViewportTransform();
            } else if (pointerIds.length === 2 && initialPinchDistance > 0) {
                const p1 = activePointers[pointerIds[0]]; const p2 = activePointers[pointerIds[1]];
                const currentDistance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                const factor = currentDistance / initialPinchDistance;
                const midX = (p1.x + p2.x) / 2; const midY = (p1.y + p2.y) / 2;
                const rect = viewport.getBoundingClientRect();
                const centerX = midX - rect.left; const centerY = midY - rect.top;
                const xs = (centerX - panX) / scale; const ys = (centerY - panY) / scale;

                scale = Math.min(Math.max(0.25, initialScale * factor), 2.5);
                panX = centerX - xs * scale; panY = centerY - ys * scale;
                updateViewportTransform();
            }
        });

        const endPointerHandler = (e) => {
            delete activePointers[e.pointerId]; isPanning = false; initialPinchDistance = 0;
            const remainingKeys = Object.keys(activePointers);
            if (remainingKeys.length === 1) {
                isPanning = true; const p = activePointers[remainingKeys[0]];
                startPointerX = p.x; startPointerY = p.y; initialPanX = panX; initialPanY = panY;
            }
        };
        viewport.addEventListener('pointerup', endPointerHandler);
        viewport.addEventListener('pointercancel', endPointerHandler);

        viewport.addEventListener('wheel', (e) => {
            if (isPowerSaving) return; e.preventDefault();
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const xs = (mouseX - panX) / scale; const ys = (e.clientY - rect.top - panY) / scale;
            scale = Math.min(Math.max(0.25, e.deltaY < 0 ? scale * 1.1 : scale * 0.9), 2.5);
            panX = mouseX - xs * scale; panY = (e.clientY - rect.top) - ys * scale;
            updateViewportTransform();
        }, { passive: false });

        // ホームポジション（中央視点）へのリセット関数
        function resetToHomeView(smooth = false) {
            if (isPowerSaving) return;
            if (smooth) {
                spaceContainer.classList.add('smooth-returning');
            }
            scale = 1.0;
            if (capsules.length > 0) {
                const phys = physicsItems.find(p => p.el === capsules[0]);
                panX = window.innerWidth / 2 - ((phys ? phys.x : 2500) + 120 - 2500);
                panY = window.innerHeight / 2 - ((phys ? phys.y : 2220) + 24 - 2500);
            } else {
                panX = window.innerWidth / 2; panY = window.innerHeight / 2 - 50;
            }
            updateViewportTransform();
            if (smooth) {
                setTimeout(() => spaceContainer.classList.remove('smooth-returning'), 600);
            }
        }

        document.getElementById('zoom-in').addEventListener('click', () => adjustZoom(1.2));
        document.getElementById('zoom-out').addEventListener('click', () => adjustZoom(0.8));
        document.getElementById('zoom-reset').addEventListener('click', () => resetToHomeView(true));

        function adjustZoom(factor) {
            const xs = (window.innerWidth / 2 - panX) / scale; const ys = (window.innerHeight / 2 - panY) / scale;
            scale = Math.min(Math.max(0.25, scale * factor), 2.5);
            panX = window.innerWidth / 2 - xs * scale; panY = window.innerHeight / 2 - ys * scale;
            updateViewportTransform();
        }

        function updateViewportTransform() {
            if (isPowerSaving) return;
            spaceContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            updateThreads();
        }

        /* =========================================
           IV. アイデアの射出処理
           ========================================= */
        ideaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = ideaInput.value.trim();
                if (text !== "") { shootInputAsCapsule(text); ideaInput.value = ""; }
            }
        });

        function shootInputAsCapsule(text) {
            if (isPowerSaving) {
                createCapsuleElement(text, 0, 0);
                uploadDataToCloud();
                return;
            }

            const inputRect = ideaInput.getBoundingClientRect();
            const phantom = document.createElement('div');
            phantom.classList.add('capsule-phantom');
            phantom.style.left = `${inputRect.left}px`; phantom.style.top = `${inputRect.top}px`;
            phantom.style.width = `${inputRect.width}px`; phantom.style.height = `${inputRect.height}px`;
            phantom.innerHTML = `<span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%; margin-left:15px;">${escapeHTML(text)}</span>`;
            document.body.appendChild(phantom);

            ideaInput.blur(); ideaInput.style.opacity = '0';
            ideaInput.classList.remove('approaching-new-input');
            setTimeout(() => { ideaInput.style.opacity = '1'; ideaInput.classList.add('approaching-new-input'); ideaInput.focus(); }, 100);

            const targetX = 2500 + (Math.random() * 300 - 150);
            const targetY = 2300 + (capsules.length * 120) + (Math.random() * 50);
            const screenTargetX = targetX * scale + panX - 2500 * scale;
            const screenTargetY = targetY * scale + panY - 2500 * scale;

            requestAnimationFrame(() => {
                phantom.classList.add('morphing');
                phantom.style.left = `${screenTargetX}px`; phantom.style.top = `${screenTargetY}px`;
                phantom.style.width = `${240 * scale}px`; phantom.style.height = `${48 * scale}px`;
                phantom.style.transform = `scale(0.95)`; phantom.style.fontSize = `${14 * scale}px`;

                setTimeout(() => {
                    phantom.remove();
                    createCapsuleElement(text, targetX, targetY);
                    uploadDataToCloud(); // クラウドへ保存
                }, 750);
            });
        }

        /* =========================================
           V. カプセルの構築と生成
           ========================================= */
        function createCapsuleElement(text, x, y) {
            rebuildCapsuleElement(text, x, y);
            updatePriorityNumbers();
            updateThreads();
            checkEmptyState();
        }

        function rebuildCapsuleElement(text, x, y) {
            const capsule = document.createElement('div');
            capsule.classList.add('capsule');
            capsule.innerHTML = `
                <div class="priority-num">--</div>
                <span class="capsule-text">${escapeHTML(text)}</span>
                <div class="capsule-controls">
                    <div class="power-saving-arrows">
                        <button class="control-btn arrow-btn up-btn" title="上へ移動">▲</button>
                        <button class="control-btn arrow-btn down-btn" title="下へ移動">▼</button>
                    </div>
                    <button class="control-btn complete-btn" title="完了">✓</button>
                    <button class="control-btn delete-btn" title="削除">×</button>
                </div>
            `;

            // 省電力用矢印処理
            capsule.querySelector('.up-btn').addEventListener('click', (e) => {
                e.stopPropagation(); const idx = capsules.indexOf(capsule);
                if (idx > 0) { capsules.splice(idx, 1); capsules.splice(idx - 1, 0, capsule); syncDOMAndRender(); uploadDataToCloud(); }
            });
            capsule.querySelector('.down-btn').addEventListener('click', (e) => {
                e.stopPropagation(); const idx = capsules.indexOf(capsule);
                if (idx > 0 && idx < capsules.length - 1) { capsules.splice(idx, 1); capsules.splice(idx + 1, 0, capsule); syncDOMAndRender(); uploadDataToCloud(); }
            });

            capsule.querySelector('.complete-btn').addEventListener('click', (e) => { e.stopPropagation(); completeCapsule(capsule, text); });
            capsule.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); removeCapsule(capsule); });

            spaceContainer.appendChild(capsule);
            capsules.push(capsule);

            const phys = { el: capsule, x: x, y: y, vx: 0, vy: 0, isDragging: false, floatPhaseX: Math.random() * 100, floatPhaseY: Math.random() * 100, floatSpeed: 0.01 + Math.random() * 0.01 };
            physicsItems.push(phys);

            setupDraggable(phys);
        }

        function syncDOMAndRender() {
            capsules.forEach(cap => spaceContainer.appendChild(cap));
            updatePriorityNumbers();
            updateThreads();
        }

        /* =========================================
           VI. ドラッグ＆ドロップロジック (通常空間 & 省電力)
           ========================================= */
        function setupDraggable(phys) {
            const el = phys.el;
            let isDragging = false;
            let lastMouseX = 0; let lastMouseY = 0;
            let mouseVelX = 0; let mouseVelY = 0;

            // 省電力用の並び替え用変数
            let startIdx = -1;

            el.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.control-btn')) return;

                if (isPowerSaving) {
                    // 省電力モード時の縦並び並び替えドラッグ
                    if (capsules[0] === el) return; // アンカーは移動不可
                    isDragging = true;
                    startIdx = capsules.indexOf(el);
                    el.classList.add('saving-dragging');
                    lastMouseY = e.clientY;
                    el.setPointerCapture(e.pointerId);
                    e.stopPropagation();
                    return;
                }

                // 通常モード（宇宙空間ドラッグ）
                if (capsules[0] === el) { phys.vx = (Math.random() - 0.5) * 3; phys.vy = (Math.random() - 0.5) * 3; return; }
                isGlobalDraggingItem = true; isDragging = true; phys.isDragging = true;
                phys.vx = 0; phys.vy = 0; lastMouseX = e.clientX; lastMouseY = e.clientY;
                el.setPointerCapture(e.pointerId);
                e.stopPropagation();
            });

            el.addEventListener('pointermove', (e) => {
                if (!isDragging) return;

                if (isPowerSaving) {
                    // 省電力モードの移動処理
                    const currentIdx = capsules.indexOf(el);
                    const rect = el.getBoundingClientRect();
                    const deltaY = e.clientY - lastMouseY;

                    // マウスがアイテムの高さの半分以上上下に動いたら位置を入れ替える
                    if (deltaY > rect.height * 0.6 && currentIdx < capsules.length - 1) {
                        capsules.splice(currentIdx, 1);
                        capsules.splice(currentIdx + 1, 0, el);
                        syncDOMAndRender();
                        lastMouseY = e.clientY;
                    } else if (deltaY < -rect.height * 0.6 && currentIdx > 1) { // 1番目(Index 0)には割り込めない
                        capsules.splice(currentIdx, 1);
                        capsules.splice(currentIdx - 1, 0, el);
                        syncDOMAndRender();
                        lastMouseY = e.clientY;
                    }
                    return;
                }

                // 通常空間ドラッグ
                const dx = (e.clientX - lastMouseX) / scale;
                const dy = (e.clientY - lastMouseY) / scale;
                phys.x += dx; phys.y += dy;
                el.style.left = `${phys.x}px`; el.style.top = `${phys.y}px`;
                mouseVelX = dx; mouseVelY = dy;
                lastMouseX = e.clientX; lastMouseY = e.clientY;

                updateThreads();
                checkThreadIntersection(phys);
                e.stopPropagation();
            });

            const stopDrag = (e) => {
                if (!isDragging) return;
                isDragging = false;

                if (isPowerSaving) {
                    el.classList.remove('saving-dragging');
                    if (startIdx !== capsules.indexOf(el)) {
                        uploadDataToCloud(); // 順番が変わったのでクラウド同期
                    }
                    return;
                }

                phys.isDragging = false; isGlobalDraggingItem = false;
                phys.vx = mouseVelX * 0.85; phys.vy = mouseVelY * 0.85;
                applyThreadIntersection(phys);
                updateThreads();
                uploadDataToCloud(); // 位置が変わったのでクラウド同期
            };

            el.addEventListener('pointerup', stopDrag);
            el.addEventListener('pointercancel', stopDrag);
        }

        function updatePhysics() {
            if (isPowerSaving) { requestAnimationFrame(updatePhysics); return; }

            physicsItems.forEach((phys) => {
                if (capsules[0] === phys.el) {
                    phys.x += ((2500 - phys.el.offsetWidth / 2) - phys.x) * 0.25;
                    phys.y += (2220 - phys.y) * 0.25;
                    phys.el.style.left = `${phys.x}px`; phys.el.style.top = `${phys.y}px`;
                    return;
                }
                if (phys.isDragging) return;

                phys.x += phys.vx; phys.y += phys.vy;
                phys.vx *= 0.94; phys.vy *= 0.94;

                phys.floatPhaseX += phys.floatSpeed; phys.floatPhaseY += phys.floatSpeed;
                phys.x += Math.sin(phys.floatPhaseX) * 0.22; phys.y += Math.cos(phys.floatPhaseY) * 0.22;

                if (phys.x < 500) phys.vx += 0.2; if (phys.x > 4500) phys.vx -= 0.2;
                if (phys.y < 500) phys.vy += 0.2; if (phys.y > 4500) phys.vy -= 0.2;
                phys.el.style.left = `${phys.x}px`; phys.el.style.top = `${phys.y}px`;
            });

            updateThreads();
            requestAnimationFrame(updatePhysics);
        }
        requestAnimationFrame(updatePhysics);

        /* =========================================
           VII. 接続糸システム
           ========================================= */
        let activeHighlightIndex = -1;

        function getDistanceToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1; const dy = y2 - y1; const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(px - x1, py - y1);
            let t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
            return { dist: Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy)), t: t };
        }

        function checkThreadIntersection(activePhys) {
            if (capsules.length < 2) return;
            const px = activePhys.x + activePhys.el.offsetWidth / 2; const py = activePhys.y + activePhys.el.offsetHeight / 2;
            let closestDist = 99999; let closestIndex = -1;

            for (let i = 0; i < capsules.length - 1; i++) {
                const cap1 = capsules[i]; const cap2 = capsules[i+1];
                if (cap1 === activePhys.el || cap2 === activePhys.el) continue;
                const x1 = parseFloat(cap1.style.left) + cap1.offsetWidth / 2; const y1 = parseFloat(cap1.style.top) + cap1.offsetHeight / 2;
                const x2 = parseFloat(cap2.style.left) + cap2.offsetWidth / 2; const y2 = parseFloat(cap2.style.top) + cap2.offsetHeight / 2;
                const res = getDistanceToSegment(px, py, x1, y1, x2, y2);
                if (res.dist < 80 && res.dist < closestDist) { closestDist = res.dist; closestIndex = i; }
            }
            activeHighlightIndex = closestIndex;
            updateThreads();
        }

        function applyThreadIntersection(activePhys) {
            if (activeHighlightIndex !== -1) {
                const targetCapsule = activePhys.el;
                capsules = capsules.filter(c => c !== targetCapsule);
                capsules.splice(activeHighlightIndex + 1, 0, targetCapsule);
                activeHighlightIndex = -1;
                updatePriorityNumbers();
                syncDOMAndRender();
            }
        }

        function updatePriorityNumbers() {
            capsules.forEach((capsule, index) => {
                const numBadge = capsule.querySelector('.priority-num');
                if (numBadge) numBadge.textContent = String(index + 1).padStart(2, '0');
                if (index === 0) { capsule.classList.add('first-fixed'); if (numBadge) numBadge.innerHTML = "★"; } 
                else { capsule.classList.remove('first-fixed'); }
            });
        }

        function updateThreads() {
            if (isPowerSaving || capsules.length < 2) { svgElement.innerHTML = ''; return; }
            let linesHTML = '';
            for (let i = 0; i < capsules.length - 1; i++) {
                const cap1 = capsules[i]; const cap2 = capsules[i+1];
                const x1 = parseFloat(cap1.style.left) + cap1.offsetWidth / 2; const y1 = parseFloat(cap1.style.top) + cap1.offsetHeight / 2;
                const x2 = parseFloat(cap2.style.left) + cap2.offsetWidth / 2; const y2 = parseFloat(cap2.style.top) + cap2.offsetHeight / 2;
                linesHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${i === activeHighlightIndex ? 'thread-line highlight' : 'thread-line'}" />`;
            }
            svgElement.innerHTML = linesHTML;
        }

        /* =========================================
           VIII. 完了・削除・復活アクション
           ========================================= */
        function removeCapsule(capsule) {
            capsules = capsules.filter(c => c !== capsule); physicsItems = physicsItems.filter(p => p.el !== capsule);
            capsule.style.transition = 'all 0.3s ease'; capsule.style.transform = 'scale(0.1)'; capsule.style.opacity = '0';
            setTimeout(() => { capsule.remove(); updatePriorityNumbers(); updateThreads(); checkEmptyState(); uploadDataToCloud(); }, 300);
        }

        function completeCapsule(capsule, text) {
            capsules = capsules.filter(c => c !== capsule); physicsItems = physicsItems.filter(p => p.el !== capsule);
            capsule.style.transition = 'all 0.4s cubic-bezier(0.19, 1, 0.22, 1)'; capsule.style.transform = 'scale(0.2) translate(500px, -500px)'; capsule.style.opacity = '0';

            setTimeout(() => {
                capsule.remove(); updatePriorityNumbers(); updateThreads(); checkEmptyState();
                rebuildCompletedElement(text);
                uploadDataToCloud(); // 完了追加による同期
                if (document.body.classList.contains('panel-closed')) togglePanel();
            }, 400);
        }

        function rebuildCompletedElement(text) {
            const completedItem = document.createElement('div');
            completedItem.classList.add('completed-capsule'); completedItem.setAttribute('draggable', 'true');
            completedItem.innerHTML = `
                <span style="word-break: break-all; flex-grow: 1; margin-right: 10px; pointer-events: none;">✓ ${escapeHTML(text)}</span>
                <button class="control-btn delete-btn" title="完全に削除" style="font-size: 16px;">×</button>
            `;

            completedItem.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); completedItem.remove(); uploadDataToCloud(); });

            // HTML5ドラッグ（PC用）
            completedItem.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', text); completedItem.classList.add('dragging-from-completed'); e.dataTransfer.effectAllowed = 'move'; });
            completedItem.addEventListener('dragend', () => completedItem.classList.remove('dragging-from-completed'));

            // ポインターによる手動ドラッグ（スマホ復活処理）
            let touchDummy = null;
            completedItem.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.delete-btn')) return;
                
                // 【バグ修正】マウス操作時はHTML5のdrag/dropイベントと競合を避けるためPointerEvent処理をスキップ
                if (e.pointerType === 'mouse') return;

                const rect = completedItem.getBoundingClientRect(); const offsetX = e.clientX - rect.left; const offsetY = e.clientY - rect.top;

                touchDummy = document.createElement('div'); touchDummy.className = 'completed-capsule';
                touchDummy.style.position = 'fixed'; touchDummy.style.left = `${rect.left}px`; touchDummy.style.top = `${rect.top}px`;
                touchDummy.style.width = `${rect.width}px`; touchDummy.style.zIndex = '9999'; touchDummy.style.borderStyle = 'solid'; touchDummy.style.pointerEvents = 'none';
                touchDummy.innerHTML = `<span>✓ ${escapeHTML(text)}</span>`; document.body.appendChild(touchDummy);

                completedItem.style.opacity = '0.3'; completedItem.setPointerCapture(e.pointerId);

                const onPointerMove = (moveEv) => { touchDummy.style.left = `${moveEv.clientX - offsetX}px`; touchDummy.style.top = `${moveEv.clientY - offsetY}px`; };
                const onPointerUp = (upEv) => {
                    completedItem.releasePointerCapture(upEv.pointerId); completedItem.style.opacity = '1';
                    const drawerRect = completedPanel.getBoundingClientRect();
                    const isOutside = isPowerSaving ? (upEv.clientY < drawerRect.top || upEv.clientY > drawerRect.bottom) : (upEv.clientX < drawerRect.left);

                    if (isOutside && touchDummy) {
                        if (isPowerSaving) { createCapsuleElement(text, 0, 0); } 
                        else {
                            const rectV = viewport.getBoundingClientRect();
                            createCapsuleElement(text, (upEv.clientX - rectV.left - panX) / scale + 2500, (upEv.clientY - rectV.top - panY) / scale + 2500);
                        }
                        completedItem.remove();
                        uploadDataToCloud(); // 宇宙へ復帰したデータをクラウドへ反映
                    }
                    if (touchDummy) { touchDummy.remove(); touchDummy = null; }
                    completedItem.removeEventListener('pointermove', onPointerMove); completedItem.removeEventListener('pointerup', onPointerUp); completedItem.removeEventListener('pointercancel', onPointerUp);
                };
                completedItem.addEventListener('pointermove', onPointerMove); completedItem.addEventListener('pointerup', onPointerUp); completedItem.addEventListener('pointercancel', upEv);
            });

            completedPanel.appendChild(completedItem);
        }

        viewport.addEventListener('dragover', (e) => { e.preventDefault(); if (!isPowerSaving) e.dataTransfer.dropEffect = 'move'; });
        viewport.addEventListener('drop', (e) => {
            e.preventDefault(); const text = e.dataTransfer.getData('text/plain');
            if (text) {
                if (isPowerSaving) { createCapsuleElement(text, 0, 0); } 
                else {
                    const rect = viewport.getBoundingClientRect();
                    createCapsuleElement(text, (e.clientX - rect.left - panX) / scale + 2500, (e.clientY - rect.top - panY) / scale + 2500);
                }
                const draggingItem = completedPanel.querySelector('.dragging-from-completed');
                if (draggingItem) draggingItem.remove();
                uploadDataToCloud();
            }
        });

        // 完了サイドパネルの開閉をトグル
        function togglePanel() { 
            const isClosed = document.body.classList.toggle('panel-closed'); 
            panelToggleBtn.textContent = isClosed ? '◀' : '▶'; 
        }
        panelToggleBtn.addEventListener('click', togglePanel);
        completedToggleTrigger.addEventListener('click', togglePanel); // 新設ヘッダーボタンと連携

        /* =========================================
           IX. 省電力モード切り替え
           ========================================= */
        function applyPowerSavingMode(enabled) {
            isPowerSaving = enabled;
            if (isPowerSaving) {
                document.body.classList.add('power-saving'); inputRegion.classList.add('power-saving-region');
                modeStatus.textContent = "省電力: ON"; svgElement.innerHTML = '';
            } else {
                document.body.classList.remove('power-saving'); inputRegion.classList.remove('power-saving-region');
                modeStatus.textContent = "省電力: OFF"; repositionForGalaxy(); updateViewportTransform();
            }
            syncDOMAndRender();
        }

        function repositionForGalaxy() {
            scale = 1.0; panX = 0; panY = 0;
            physicsItems.forEach((phys, i) => {
                setupDraggable(phys);
                if (i === 0) { phys.x = 2500 - phys.el.offsetWidth / 2; phys.y = 2220; } 
                else { phys.x = 2500 + (Math.random() * 200 - 100) - phys.el.offsetWidth / 2; phys.y = 2300 + i * 110; }
                phys.vx = 0; phys.vy = 0; phys.el.style.left = `${phys.x}px`; phys.el.style.top = `${phys.y}px`;
            });
            updatePriorityNumbers();
        }

        powerToggle.addEventListener('change', (e) => applyPowerSavingMode(e.target.checked));
        window.addEventListener('resize', updateThreads);

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        window.onload = function() {
            createStars();
            applyPowerSavingMode(false);
            checkEmptyState();
            
            // Firebase同期がOFF（ローカルモード）の場合、起動直後のタイミングで初期位置にアライン
            if (!isFirebaseActive) {
                setTimeout(() => {
                    resetToHomeView(false);
                }, 150);
            }
        };
    </script>
</body>
</html>
